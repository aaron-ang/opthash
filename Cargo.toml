[workspace]
members = ["opthash-internal"]

[package]
name = "opthash"
version = "0.1.2"
edition = "2024"
description = "Rust implementations of Elastic Hashing and Funnel Hashing"
readme = "README.md"
repository = "https://github.com/aaron-ang/opthash"
license = "MIT OR Apache-2.0"
keywords = ["hashmap", "open_addressing", "elastic_hashing", "funnel_hashing"]
categories = ["algorithms", "data-structures"]
exclude = [
    "/benches/",
    "/opthash-internal/",
    "/paper/",
    "/scripts/",
    "/.gitattributes",
    "/.gitignore",
    "/AGENTS.md",
    "/CLAUDE.md",
    "/requirements.txt",
]

[dependencies]
opthash-internal = { path = "opthash-internal", version = "0.1.0" }

[dev-dependencies]
criterion = { version = "0.8", features = ["html_reports"] }

[[bench]]
name = "benchmarks"
harness = false

[[bench]]
name = "internal_paths"
harness = false
